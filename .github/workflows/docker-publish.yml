name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*']
    # Doc/CI-only changes don't need a new image.
    paths-ignore: ['**.md', 'docs/**', '.github/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Only publish from the public repo, not the private dev mirror.
    if: github.repository == 'Rootzreggae/keystrok'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rootzreggae/keystrok
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
